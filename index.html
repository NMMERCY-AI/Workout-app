<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>MoveX — Hybrid Athlete</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  
  <!-- Link to external CSS -->
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<div class="app" id="appRoot">

  <!-- ══ SPLASH ══ -->
  <div class="screen" id="splash">
    <!-- 🖼️ REPLACE THIS SRC with your own kettlebell photo path e.g. "images/hero.jpg" -->
    <img class="sp-img" src="HOME PAGE -PHT.jpg" alt=""/>
    <div class="sp-veil"></div>
    <div class="sp-top">
      <div class="sp-brand">MoveX</div>
    </div>
    <div class="sp-bottom">
      <div class="sp-big" id="splashTitle"></div>
      <div class="sp-sub">Welcome to Move-X</div>
      <button class="btn-y" onclick="goTo('login')">GET STARTED</button>
    </div>
  </div>

  <!-- ══ LOGIN ══ -->
  <div class="screen gone" id="login">
    <div class="lg-top">
      <div class="lg-brand">MoveX</div>
      <div style="text-align: center; margin-bottom: 20px;">
        <img src="logo.png" alt="MoveX Logo" style="width: 120px; height: auto;"/>
      </div>
      <div class="lg-logo-big">START</div>
      <div class="lg-tagline">Your fitness journey</div>
    </div>
    <div style="flex:1;"></div>
    <div class="lg-form">
      <div>
        <div class="field-lbl">Enter your name</div>
        <input class="field-inp" id="nameInput" type="text" placeholder="Your name..."/>
      </div>
      <button class="btn-y" onclick="doLogin()">LOGIN</button>
      <div class="skip-lnk" onclick="doLogin()">Skip for now → <span>Enter as guest</span></div>
    </div>
  </div>

  <!-- ══ HOME ══ -->
  <div class="screen gone" id="home">
    <!-- Hero -->
    <div class="hm-hero">
      <!-- 🖼️ REPLACE SRC with your athlete photo -->
      <img class="hm-hero-img" src="splash image.jpg" alt=""/>
      <div class="hm-hero-veil"></div>
      <div class="hm-hero-content">
        <div>
          <div style="text-align: center; margin-bottom: 20px;">
            <img src="logo.png" alt="MoveX Logo" style="width: 80px; height: auto;"/>
          </div>
          <div class="hm-hi">Hi!</div>
          <div class="hm-name" id="heroName">ATHLETE</div>
        </div>
        <div class="hm-streak">
          <div class="hm-streak-dot"></div>
          <div class="hm-streak-txt">Week 1 · Beginner Plan</div>
        </div>
      </div>
    </div>
    <!-- Dynamic content injected here -->
    <div id="mainContent" style="flex:1;overflow-y:auto;"></div>
    <!-- Nav -->
    <div class="nav-bar">
      <button class="nav-btn on" id="nb-workout" onclick="switchMain('workout',this)">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="9" width="4" height="2" rx="1" fill="currentColor"/>
          <rect x="14" y="9" width="4" height="2" rx="1" fill="currentColor"/>
          <rect x="5" y="6" width="2" height="8" rx="1" fill="currentColor"/>
          <rect x="13" y="6" width="2" height="8" rx="1" fill="currentColor"/>
          <rect x="7" y="8" width="6" height="4" rx="1" fill="currentColor"/>
        </svg>
        Workout
      </button>
      <button class="nav-btn" id="nb-diet" onclick="switchMain('diet',this)">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 6v4l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Diet
      </button>
    </div>
  </div>

</div><!-- end .app -->

<!-- Link to external JavaScript -->
<script src="js/app.js"></script>
</body>
</html>
